name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to release (e.g. v2.0.0). Leave empty to build from default branch."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-macos-native:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Swift test
        run: swift test --package-path macos

      - name: Build native app
        run: bash macos/scripts/build-native-app.sh --release --no-open --output-dir "$RUNNER_TEMP/native-app"

      - name: Archive native app
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find "$RUNNER_TEMP/native-app" -maxdepth 1 -name '*.app' -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo "未找到原生 .app 产物" >&2
            exit 1
          fi
          zip_path="$RUNNER_TEMP/$(basename "$app_path" .app)-macos.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$zip_path"
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"
          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"

      - name: Publish native release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: "DevHaven ${{ inputs.tag || github.ref_name }}"
          draft: false
          prerelease: true
          files: ${{ steps.archive.outputs.zip_path }}
