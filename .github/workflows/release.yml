name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to release (e.g. v2.0.0). Leave empty to build from default branch."
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve-tag.outputs.tag }}

    steps:
      - name: Resolve release tag
        id: resolve-tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          if [[ -z "$tag" ]]; then
            echo "缺少 release tag，无法继续发布。" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Remove duplicate draft releases for tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.resolve-tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          draft_ids="$(gh release list --limit 100 --json databaseId,tagName,isDraft --jq '.[] | select(.tagName == env.RELEASE_TAG and .isDraft == true) | .databaseId')"
          if [[ -z "$draft_ids" ]]; then
            echo "未发现需要清理的重复 draft release。"
            exit 0
          fi

          while IFS= read -r release_id; do
            [[ -n "$release_id" ]] || continue
            echo "删除重复 draft release: $release_id"
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/$release_id"
          done <<< "$draft_ids"

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.resolve-tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          release_name="DevHaven ${RELEASE_TAG}"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$release_name" --prerelease
          else
            gh release create "$RELEASE_TAG" --title "$release_name" --prerelease --notes ""
          fi

  build-macos-native:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-26
            swift_triple: ""
          - arch: x86_64
            runner: macos-26
            swift_triple: x86_64-apple-macosx14.0

    runs-on: ${{ matrix.runner }}
    env:
      GHOSTTY_SOURCE_REF: da10707f93104c5466cd4e64b80ff48f789238a0

    steps:
      - uses: actions/checkout@v4

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Install Zig
        run: brew install zig

      - name: Checkout Ghostty source
        shell: bash
        run: |
          set -euo pipefail
          ghostty_dir="$RUNNER_TEMP/ghostty"
          rm -rf "$ghostty_dir"
          git init "$ghostty_dir"
          git -C "$ghostty_dir" remote add origin https://github.com/ghostty-org/ghostty.git
          git -C "$ghostty_dir" fetch --depth 1 origin "$GHOSTTY_SOURCE_REF"
          git -C "$ghostty_dir" checkout --detach FETCH_HEAD

      - name: Bootstrap Ghostty vendor
        shell: bash
        run: |
          set -euo pipefail
          ghostty_dir="$RUNNER_TEMP/ghostty"
          bash macos/scripts/setup-ghostty-framework.sh --source "$ghostty_dir"

      - name: Swift test
        if: ${{ matrix.arch == 'arm64' }}
        run: swift test --package-path macos

      - name: Validate x86_64 compile
        if: ${{ matrix.arch == 'x86_64' }}
        run: swift build --package-path macos -c debug --triple "${{ matrix.swift_triple }}"

      - name: Build native app
        env:
          DEVHAVEN_NATIVE_TRIPLE: ${{ matrix.swift_triple }}
        run: bash macos/scripts/build-native-app.sh --release --no-open --output-dir "$RUNNER_TEMP/native-app"

      - name: Archive native app
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find "$RUNNER_TEMP/native-app" -maxdepth 1 -name '*.app' -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo "未找到原生 .app 产物" >&2
            exit 1
          fi
          zip_path="$RUNNER_TEMP/DevHaven-macos-${{ matrix.arch }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$zip_path"
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"
          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"

      - name: Publish native release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" "${{ steps.archive.outputs.zip_path }}" --clobber
