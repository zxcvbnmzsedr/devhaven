name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to release (e.g. v3.0.1). Leave empty to use the triggering ref."
        required: false
        type: string

permissions:
  contents: write

env:
  GHOSTTY_SOURCE_REF: da10707f93104c5466cd4e64b80ff48f789238a0
  STABLE_APPCAST_ALIAS_TAG: stable-appcast

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve-tag.outputs.tag }}
      version: ${{ steps.resolve-tag.outputs.version }}
      build_number: ${{ steps.resolve-tag.outputs.build_number }}

    steps:
      - name: Resolve release tag
        id: resolve-tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          if [[ -z "$tag" ]]; then
            echo "缺少 release tag，无法继续发布。" >&2
            exit 1
          fi
          version="${tag#v}"
          if [[ "$version" == "$tag" ]]; then
            echo "release tag 必须以 v 开头，例如 v3.0.1。" >&2
            exit 1
          fi
          build_number="$(date -u +%Y%m%d%H%M%S)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"

      - name: Remove duplicate draft releases for tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.resolve-tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          draft_ids="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" --jq '.[] | select(.tag_name == env.RELEASE_TAG and .draft == true) | .id')"
          if [[ -z "$draft_ids" ]]; then
            echo "未发现需要清理的重复 draft release。"
            exit 0
          fi

          while IFS= read -r release_id; do
            [[ -n "$release_id" ]] || continue
            echo "删除重复 draft release: $release_id"
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/$release_id"
          done <<< "$draft_ids"

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.resolve-tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          release_name="DevHaven ${RELEASE_TAG}"
          if gh release view "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" --title "$release_name"
          else
            gh release create "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" --title "$release_name" --notes ""
          fi

  prepare-ghostty-vendor:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Restore Ghostty vendor cache
        id: ghostty-cache
        uses: actions/cache@v4
        with:
          path: |
            macos/Vendor/GhosttyKit.xcframework
            macos/Vendor/GhosttyResources
          key: ${{ runner.os }}-ghostty-vendor-${{ env.GHOSTTY_SOURCE_REF }}-${{ hashFiles('macos/scripts/setup-ghostty-framework.sh') }}

      - name: Validate cached Ghostty vendor
        if: ${{ steps.ghostty-cache.outputs.cache-hit == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          bash macos/scripts/setup-ghostty-framework.sh --verify-only

      - name: Install Zig
        if: ${{ steps.ghostty-cache.outputs.cache-hit != 'true' }}
        run: brew install zig

      - name: Checkout Ghostty source
        if: ${{ steps.ghostty-cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          ghostty_dir="$RUNNER_TEMP/ghostty"
          rm -rf "$ghostty_dir"
          git init "$ghostty_dir"
          git -C "$ghostty_dir" remote add origin https://github.com/ghostty-org/ghostty.git
          git -C "$ghostty_dir" fetch --depth 1 origin "$GHOSTTY_SOURCE_REF"
          git -C "$ghostty_dir" checkout --detach FETCH_HEAD

      - name: Bootstrap Ghostty vendor
        if: ${{ steps.ghostty-cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          bash macos/scripts/setup-ghostty-framework.sh --source "$RUNNER_TEMP/ghostty"

      - name: Verify fresh Ghostty vendor
        if: ${{ steps.ghostty-cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          bash macos/scripts/setup-ghostty-framework.sh --verify-only

      - name: Upload Ghostty vendor artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostty-vendor
          path: |
            macos/Vendor/GhosttyKit.xcframework
            macos/Vendor/GhosttyResources
          if-no-files-found: error

  build-macos-native:
    needs:
      - prepare-release
      - prepare-ghostty-vendor
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-26
            swift_triple: ""
          - arch: x86_64
            runner: macos-26
            swift_triple: x86_64-apple-macosx14.0

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate Sparkle public key
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "$SPARKLE_PUBLIC_ED_KEY" ]] || {
            echo "缺少 secrets.SPARKLE_PUBLIC_ED_KEY，无法产出支持自动升级的 release 构建。" >&2
            exit 1
          }

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Download Ghostty vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: ghostty-vendor
          path: macos/Vendor

      - name: Verify Ghostty vendor
        shell: bash
        run: |
          set -euo pipefail
          bash macos/scripts/setup-ghostty-framework.sh --verify-only

      - name: Bootstrap Sparkle vendor/tooling
        shell: bash
        run: |
          set -euo pipefail
          bash macos/scripts/setup-sparkle-framework.sh --ensure-worktree-vendor

      - name: Validate arm64 compile
        if: ${{ matrix.arch == 'arm64' }}
        run: swift build --package-path macos -c debug

      - name: Validate x86_64 compile
        if: ${{ matrix.arch == 'x86_64' }}
        run: swift build --package-path macos -c debug --triple "${{ matrix.swift_triple }}"

      - name: Build native app
        env:
          DEVHAVEN_NATIVE_TRIPLE: ${{ matrix.swift_triple }}
          DEVHAVEN_SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          bash macos/scripts/build-native-app.sh             --release             --no-open             --output-dir "$RUNNER_TEMP/native-app"             --version "${{ needs.prepare-release.outputs.version }}"             --build-number "${{ needs.prepare-release.outputs.build_number }}"             --update-channel stable

      - name: Archive native app
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find "$RUNNER_TEMP/native-app" -maxdepth 1 -name '*.app' -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo "未找到原生 .app 产物" >&2
            exit 1
          fi
          zip_path="$RUNNER_TEMP/DevHaven-macos-${{ matrix.arch }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$zip_path"
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"
          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"

      - name: Upload archive artifact for universal merge
        uses: actions/upload-artifact@v4
        with:
          name: native-app-zip-${{ matrix.arch }}
          path: ${{ steps.archive.outputs.zip_path }}
          if-no-files-found: error

      - name: Publish native release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" "${{ steps.archive.outputs.zip_path }}" --clobber

  publish-appcast:
    needs:
      - prepare-release
      - build-macos-native
    runs-on: macos-26
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
      RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
      RELEASE_BUILD_NUMBER: ${{ needs.prepare-release.outputs.build_number }}
      DEVHAVEN_SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate Sparkle signing secrets
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "$SPARKLE_PUBLIC_ED_KEY" ]] || {
            echo "缺少 secrets.SPARKLE_PUBLIC_ED_KEY。" >&2
            exit 1
          }
          [[ -n "$SPARKLE_PRIVATE_ED_KEY" ]] || {
            echo "缺少 secrets.SPARKLE_PRIVATE_ED_KEY。" >&2
            exit 1
          }

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Bootstrap Sparkle vendor/tooling
        shell: bash
        run: |
          set -euo pipefail
          bash macos/scripts/setup-sparkle-framework.sh --ensure-worktree-vendor

      - name: Download arm64 archive artifact
        uses: actions/download-artifact@v4
        with:
          name: native-app-zip-arm64
          path: ${{ runner.temp }}/download/arm64

      - name: Download x86_64 archive artifact
        uses: actions/download-artifact@v4
        with:
          name: native-app-zip-x86_64
          path: ${{ runner.temp }}/download/x86_64

      - name: Assemble universal .app
        id: universal
        shell: bash
        run: |
          set -euo pipefail
          arm64_zip="$(find "$RUNNER_TEMP/download/arm64" -name '*.zip' -print -quit)"
          x86_zip="$(find "$RUNNER_TEMP/download/x86_64" -name '*.zip' -print -quit)"
          [[ -n "$arm64_zip" ]] || { echo "缺少 arm64 zip artifact" >&2; exit 1; }
          [[ -n "$x86_zip" ]] || { echo "缺少 x86_64 zip artifact" >&2; exit 1; }

          arm64_extract="$RUNNER_TEMP/extract/arm64"
          x86_extract="$RUNNER_TEMP/extract/x86_64"
          mkdir -p "$arm64_extract" "$x86_extract"
          ditto -x -k "$arm64_zip" "$arm64_extract"
          ditto -x -k "$x86_zip" "$x86_extract"

          arm64_app="$(find "$arm64_extract" -maxdepth 2 -name '*.app' -print -quit)"
          x86_app="$(find "$x86_extract" -maxdepth 2 -name '*.app' -print -quit)"
          [[ -n "$arm64_app" ]] || { echo "未找到 arm64 .app" >&2; exit 1; }
          [[ -n "$x86_app" ]] || { echo "未找到 x86_64 .app" >&2; exit 1; }

          universal_app="$RUNNER_TEMP/DevHaven-universal/DevHaven.app"
          bash macos/scripts/create-universal-app.sh             --arm64-app "$arm64_app"             --x86-app "$x86_app"             --output "$universal_app"

          echo "app_path=$universal_app" >> "$GITHUB_OUTPUT"

      - name: Optionally sign universal app with Developer ID
        env:
          APPLE_DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_BASE64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$APPLE_DEVELOPER_ID_CERT_P12_BASE64" || -z "$APPLE_DEVELOPER_ID_CERT_PASSWORD" || -z "$APPLE_DEVELOPER_ID_APPLICATION_IDENTITY" ]]; then
            echo "未配置 Developer ID 签名 secrets，跳过 Apple 代码签名。"
            exit 0
          fi

          keychain_path="$RUNNER_TEMP/devhaven-signing.keychain-db"
          keychain_password="devhaven-temp-$(uuidgen)"
          cert_path="$RUNNER_TEMP/devhaven-cert.p12"
          printf '%s' "$APPLE_DEVELOPER_ID_CERT_P12_BASE64" | base64 --decode > "$cert_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -k "$keychain_path" -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')

          codesign --force --deep --options runtime --sign "$APPLE_DEVELOPER_ID_APPLICATION_IDENTITY" "${{ steps.universal.outputs.app_path }}"
          codesign --verify --deep --strict "${{ steps.universal.outputs.app_path }}"

      - name: Optionally notarize universal app
        env:
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_PRIVATE_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_P8_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$APPLE_NOTARY_KEY_ID" || -z "$APPLE_NOTARY_ISSUER_ID" || -z "$APPLE_NOTARY_PRIVATE_KEY_P8_BASE64" ]]; then
            echo "未配置 notary secrets，跳过 notarization。"
            exit 0
          fi

          pre_notary_zip="$RUNNER_TEMP/DevHaven-macos-universal-for-notary.zip"
          ditto -c -k --sequesterRsrc --keepParent "${{ steps.universal.outputs.app_path }}" "$pre_notary_zip"
          key_path="$RUNNER_TEMP/AuthKey_$APPLE_NOTARY_KEY_ID.p8"
          printf '%s' "$APPLE_NOTARY_PRIVATE_KEY_P8_BASE64" | base64 --decode > "$key_path"

          xcrun notarytool submit "$pre_notary_zip"             --key "$key_path"             --key-id "$APPLE_NOTARY_KEY_ID"             --issuer "$APPLE_NOTARY_ISSUER_ID"             --wait
          xcrun stapler staple "${{ steps.universal.outputs.app_path }}"

      - name: Archive universal app
        id: universal-archive
        shell: bash
        run: |
          set -euo pipefail
          universal_zip="$RUNNER_TEMP/DevHaven-macos-universal.zip"
          ditto -c -k --sequesterRsrc --keepParent "${{ steps.universal.outputs.app_path }}" "$universal_zip"
          echo "zip_path=$universal_zip" >> "$GITHUB_OUTPUT"

      - name: Publish universal release asset
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" "${{ steps.universal-archive.outputs.zip_path }}" --clobber

      - name: Generate appcast-staged.xml
        id: generate-appcast
        shell: bash
        run: |
          set -euo pipefail
          archives_dir="$RUNNER_TEMP/appcast-archives"
          mkdir -p "$archives_dir"

          if gh release download "$STABLE_APPCAST_ALIAS_TAG" -R "$GITHUB_REPOSITORY" --pattern appcast.xml --dir "$archives_dir/existing" >/dev/null 2>&1; then
            cp "$archives_dir/existing/appcast.xml" "$archives_dir/appcast-staged.xml"
          fi

          cp "${{ steps.universal-archive.outputs.zip_path }}" "$archives_dir/"
          gh release view "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" --json body --jq '.body' > "$archives_dir/DevHaven-macos-universal.txt"

          bash macos/scripts/generate-appcast.sh             --archives-dir "$archives_dir"             --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/$RELEASE_TAG/"             --output "$archives_dir/appcast-staged.xml"             --maximum-versions 3             --maximum-deltas 0             --link "https://github.com/${GITHUB_REPOSITORY}/releases/tag/$RELEASE_TAG"             --full-release-notes-url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/$RELEASE_TAG"

          echo "appcast_path=$archives_dir/appcast-staged.xml" >> "$GITHUB_OUTPUT"

      - name: Publish staged appcast asset
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" "${{ steps.generate-appcast.outputs.appcast_path }}#appcast-staged.xml" --clobber

      - name: Promote stable appcast
        shell: bash
        run: |
          set -euo pipefail
          bash macos/scripts/promote-appcast.sh             --repo "$GITHUB_REPOSITORY"             --release-tag "$STABLE_APPCAST_ALIAS_TAG"             --appcast "${{ steps.generate-appcast.outputs.appcast_path }}"             --asset-name appcast.xml             --title "DevHaven Stable Appcast"
